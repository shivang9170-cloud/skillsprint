<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSprint - Teacher Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="teacher.css">
</head>

<body>

    <div class="app">
        <!-- TOP BAR -->
        <nav class="top-nav">
            <div class="logo">
                <span class="logo-icon">🔵</span>
                <span class="logo-text">SkillSprint</span>
            </div>
            <div class="nav-right">
                <div class="teacher-info">
                    <span class="teacher-avatar" id="navAvatar">A</span>
                    <span class="teacher-name" id="navName">Dr. Anil Sharma</span>
                </div>
                <button class="icon-btn" id="themeToggle">🌙</button>
                <button class="icon-btn" id="settingsBtn">⚙️</button>
            </div>
        </nav>

        <div class="main-container">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-nav">
                    <div class="nav-item active" data-page="dashboard">
                        <span class="nav-icon">📊</span>
                        <span class="nav-label">Dashboard</span>
                    </div>
                    <div class="nav-item" data-page="classes">
                        <span class="nav-icon">📚</span>
                        <span class="nav-label">Classes</span>
                    </div>
                    <div class="nav-item" data-page="students">
                        <span class="nav-icon">👥</span>
                        <span class="nav-label">Students</span>
                    </div>
                    <div class="nav-item" data-page="materials">
                        <span class="nav-icon">📄</span>
                        <span class="nav-label">Materials</span>
                    </div>
                    <div class="nav-item" data-page="announcements">
                        <span class="nav-icon">📢</span>
                        <span class="nav-label">Announcements</span>
                    </div>
                    <div class="nav-item" data-page="feed">
                        <span class="nav-icon">🏠</span>
                        <span class="nav-label">Feed</span>
                    </div>
                    <div class="nav-item" data-page="chat">
                        <span class="nav-icon">💬</span>
                        <span class="nav-label">Messages</span>
                        <span class="nav-badge" id="unreadBadge">0</span>
                    </div>
                    <div class="nav-item" data-page="leaderboard">
                        <span class="nav-icon">🏆</span>
                        <span class="nav-label">Leaderboard</span>
                    </div>
                    <div class="nav-item" data-page="profile">
                        <span class="nav-icon">👤</span>
                        <span class="nav-label">Profile</span>
                    </div>
                    <div class="nav-item" data-page="aiassistant">
                        <span class="nav-icon">🤖</span>
                        <span class="nav-label">AI Assistant</span>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <div class="online-status">
                        <span class="status-dot online"></span>
                        <span>Online</span>
                    </div>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="main-content">
                <!-- DASHBOARD PAGE -->
                <div id="dashboardPage" class="page active-page">
                    <div id="dashboardContainer"></div>
                </div>

                <!-- CLASSES PAGE -->
                <div id="classesPage" class="page">
                    <div id="classesContainer"></div>
                </div>

                <!-- STUDENTS PAGE -->
                <div id="studentsPage" class="page">
                    <div id="studentsContainer"></div>
                </div>

                <!-- MATERIALS PAGE -->
                <div id="materialsPage" class="page">
                    <div id="materialsContainer"></div>
                </div>

                <!-- ANNOUNCEMENTS PAGE -->
                <div id="announcementsPage" class="page">
                    <div id="announcementsContainer"></div>
                </div>

                <!-- FEED PAGE -->
                <div id="feedPage" class="page">
                    <div id="feedContainer"></div>
                </div>

                <!-- CHAT PAGE -->
                <div id="chatPage" class="page">
                    <div id="chatContainer"></div>
                </div>

                <!-- LEADERBOARD PAGE -->
                <div id="leaderboardPage" class="page">
                    <div id="leaderboardContainer"></div>
                </div>

                <!-- PROFILE PAGE -->
                <div id="profilePage" class="page">
                    <div id="profileContainer"></div>
                </div>

                <!-- AI ASSISTANT PAGE -->
                <div id="aiassistantPage" class="page">
                    <div id="aiAssistantContainer"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>⚙️ Settings</h3>
            <div class="setting-item">
                <label>Dark Mode</label>
                <label class="switch">
                    <input type="checkbox" id="darkModeSetting">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn-primary" id="closeSettings" style="margin-top:20px; width:100%;">Save & Close</button>
        </div>
    </div>

    <script src="teacher.js"></script>
</body>

</html>
