<!DOCTYPE html>
<html>

<head>
    <title>Angel One Login Test - Fixed</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }

        button {
            background: #0f0;
            color: #000;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 10px 0;
        }

        pre {
            background: #111;
            padding: 10px;
            border: 1px solid #0f0;
            overflow: auto;
            white-space: pre-wrap;
        }

        .success {
            color: #0f0;
        }

        .error {
            color: #f00;
        }
    </style>
</head>

<body>
    <h2>🔐 Angel One API Login Test (Fixed Headers)</h2>
    <p>API Key: <strong>Fyt3hWTf</strong><br>Client Code: <strong>RKMMA17414</strong></p>

    <button id="loginBtn">🔑 Login (Enter OTP)</button>

    <h3>Response:</h3>
    <pre id="output">Waiting...</pre>

    <script>
        const API_KEY = "Fyt3hWTf";
        const CLIENT_CODE = "RKMMA17414";
        const PASSWORD = "694202";

        document.getElementById('loginBtn').onclick = async () => {
            const otp = prompt("📱 Enter 6-digit OTP from Angel One app/SMS:");
            if (!otp || otp.length !== 6) {
                document.getElementById('output').innerHTML = '<span class="error">❌ OTP required (6 digits)</span>';
                return;
            }

            document.getElementById('output').innerHTML = "⏳ Logging in...";

            try {
                const response = await fetch('https://apiconnect.angelone.in/rest/auth/angelbroking/user/v1/loginByPassword', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'X-SourceID': 'WEB',      // ✅ Required header
                        'X-ClientLocalIP': '127.0.0.1',
                        'X-ClientPublicIP': '127.0.0.1',
                        'X-MACAddress': '00:00:00:00:00:00',
                        'X-PrivateKey': API_KEY
                    },
                    body: JSON.stringify({
                        clientcode: CLIENT_CODE,
                        password: PASSWORD,
                        totp: otp,
                        apikey: API_KEY
                    })
                });

                const data = await response.json();
                document.getElementById('output').innerHTML = JSON.stringify(data, null, 2);

                if (data.status && data.data) {
                    console.log("✅ Login Success!");
                    console.log("JWT Token:", data.data.jwtToken);
                    console.log("Feed Token:", data.data.feedToken);
                    document.getElementById('output').innerHTML += '\n\n✅ SUCCESS! Token received.';
                } else {
                    document.getElementById('output').innerHTML += '\n\n❌ FAILED: ' + (data.message || 'Unknown error');
                }
            } catch (err) {
                document.getElementById('output').innerHTML = '<span class="error">❌ Error: ' + err.message + '</span>';
            }
        };
    </script>
</body>

</html>
