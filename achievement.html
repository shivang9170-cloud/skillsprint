<!DOCTYPE html>
<html>

<head>
    <title>Achievements</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            color: #06b6d4;
        }

        .achievement {
            background: rgba(6, 182, 212, 0.1);
            padding: 10px 15px;
            border-radius: 12px;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🏆 My Achievements</h2>
        <div id="achievements"></div>
    </div>
    <script>
        window.onload = function () {
            // Demo: static achievements
            let achievements = [
                { title: "First Login", desc: "Logged in for the first time!" },
                { title: "Skill Master", desc: "Added 5 skills." },
                { title: "Profile Complete", desc: "Completed your profile." }
            ];
            document.getElementById("achievements").innerHTML = achievements.map(a => `<div class='achievement'><b>${a.title}</b><br>${a.desc}</div>`).join("");
        };
    </script>
</body>

</html>
