<!DOCTYPE html>
<html>

<head>
    <title>Badges</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            min-height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        h2 {
            text-align: center;
            color: #06b6d4;
        }

        .badge {
            display: inline-block;
            background: rgba(6, 182, 212, 0.15);
            padding: 10px 15px;
            border-radius: 16px;
            margin: 10px 5px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🎖️ My Badges</h2>
        <div id="badges"></div>
    </div>
    <script>
        window.onload = function () {
            // Demo: static badges
            let badges = [
                { icon: "🌟", name: "Rising Star" },
                { icon: "💡", name: "Innovator" },
                { icon: "🔥", name: "Streak Holder" }
            ];
            document.getElementById("badges").innerHTML = badges.map(b => `<span class='badge'>${b.icon} ${b.name}</span>`).join("");
        };
    </script>
</body>

</html>
