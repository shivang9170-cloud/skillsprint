<!DOCTYPE html>
<html>

<head>
    <title>Reset Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            height: 100vh;
            background: #020617;
            overflow: hidden;
        }

        /* Glow animation */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #06b6d4 1px, transparent 1px);
            background-size: 40px 40px;
            animation: move 15s linear infinite;
            opacity: 0.15;
        }

        @keyframes move {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-150px, -150px);
            }
        }

        /* Card */
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            color: white;
        }

        h2 {
            text-align: center;
            color: #06b6d4;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #555;
            background: transparent;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 25px;
            background: #06b6d4;
            color: black;
            cursor: pointer;
        }

        button:hover {
            box-shadow: 0 0 15px #06b6d4;
        }

        a {
            color: #06b6d4;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🔄 Reset Password</h2>

        <input id="user" placeholder="UserID / Email / Phone">

        <button onclick="sendOTP()">Send OTP</button>

        <input id="otp" placeholder="Enter OTP">
        <input id="newpass" placeholder="New Password">

        <button onclick="reset()">Reset Password</button>

        <p style="text-align:center;margin-top:10px;">
            <a href="login.html">Back to Login</a>
        </p>
    </div>

    <script>
        // sendOTP and reset now in auth.js
    </script>

</body>

</html>
