    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .fullscreen-chart {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #chart {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 15%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 20px;
            flex-wrap: wrap;
        }

        .symbol-name {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
        }

        .symbol-exchange {
            font-size: 14px;
            color: #888;
        }

        .price-info {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .current-price {
            font-size: 32px;
            font-weight: 900;
            color: #00ff88;
            font-variant-numeric: tabular-nums;
        }

        .price-change {
            font-size: 18px;
            font-weight: 700;
        }

        .price-up {
            color: #00ff88;
        }

        .price-down {
            color: #ff4444;
        }

        .market-stats {
            display: flex;
            gap: 30px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 16px;
            color: #ccc;
            font-weight: 700;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(1.5);
            }
        }

        .live-text {
            font-size: 13px;
            color: #00ff88;
            font-weight: 700;
        }

        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 10%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .timeframe-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .timeframe-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .timeframe-btn.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        .time-range {
            font-size: 14px;
            color: #666;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.015);
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }

        .ws-badge {
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 12px;
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        select {
            background: #1a1a1a;
            color: #00ff88;
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 6px 12px;
            margin-left: 15px;
            font-weight: 600;
            cursor: pointer;

        /* Prediction Panel Styles */
        #prediction-panel {
            position: absolute;
            bottom: 12%;
            right: 20px;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 18px;
            border-left: 4px solid #ffaa44;
            z-index: 200;
            font-family: monospace;
            min-width: 280px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;

        }

        .prediction-hidden {
            display: none !important;

        /* API status badge */
        .api-key-badge {
            background: #0a1e1a;

            border-radius: 20px;
            padding: 4px 12px;
            font-size: 10px;
            color: #00ff88;
            margin-left: 12px;
        }
    </style>
</head>

    <script>

        const SECRET_KEY = "03578029-071a-4f99-bc56-3df9229ac855";
        const CLIENT_CODE = "RKMMA17414";
        const PASSWORD = "694202";

        // ============================================================
        // CANDLESTICK PATTERN DETECTION LIBRARY
        // ============================================================
        const PatternDetector = {
            isDoji: (c) => {
                const body = Math.abs(c.close - c.open);
                const range = c.high - c.low;
                return range > 0 && (body / range) <= 0.1;
            },
            isHammer: (c) => {
                const body = Math.abs(c.close - c.open);
                const lowerWick = Math.min(c.open, c.close) - c.low;
                const upperWick = c.high - Math.max(c.open, c.close);
                return lowerWick >= 2 * body && upperWick <= body * 0.3;
            },
            isShootingStar: (c) => {
                const body = Math.abs(c.close - c.open);
                const upperWick = c.high - Math.max(c.open, c.close);
                const lowerWick = Math.min(c.open, c.close) - c.low;
                return upperWick >= 2 * body && lowerWick <= body * 0.3;
            },
            isMarubozu: (c) => {
                const upperWick = c.high - Math.max(c.open, c.close);
                const lowerWick = Math.min(c.open, c.close) - c.low;
                return upperWick <= 0.05 && lowerWick <= 0.05;
            },
            isBullishEngulfing: (prev, curr) => {
                if (!prev || !curr) return false;
                return prev.close < prev.open && curr.close > curr.open &&
                    curr.open < prev.close && curr.close > prev.open;
            },
            isBearishEngulfing: (prev, curr) => {
                if (!prev || !curr) return false;
                return prev.close > prev.open && curr.close < curr.open &&
                    curr.open > prev.close && curr.close < prev.open;
            },
            isPiercing: (prev, curr) => {
                if (!prev || !curr) return false;
                return prev.close < prev.open && curr.close > curr.open &&
                    curr.open < prev.close && curr.close > (prev.open + prev.close) / 2;
            },
            isDarkCloudCover: (prev, curr) => {
                if (!prev || !curr) return false;
                return prev.close > prev.open && curr.close < curr.open &&
                    curr.open > prev.close && curr.close < (prev.open + prev.close) / 2;
            },
            isBullishHarami: (prev, curr) => {
                if (!prev || !curr) return false;
                return prev.close < prev.open && curr.close > curr.open &&
                    curr.high < prev.high && curr.low > prev.low;
            },
            isBearishHarami: (prev, curr) => {
                if (!prev || !curr) return false;
                return prev.close > prev.open && curr.close < curr.open &&
                    curr.high < prev.high && curr.low > prev.low;
            },
            isMorningStar: (c1, c2, c3) => {
                if (!c1 || !c2 || !c3) return false;
                return c1.close < c1.open && c2.close > c2.open &&
                    Math.abs(c2.close - c2.open) < Math.abs(c1.close - c1.open) * 0.5 &&
                    c3.close > c3.open && c3.close > (c1.open + c1.close) / 2;
            },
            isEveningStar: (c1, c2, c3) => {
                if (!c1 || !c2 || !c3) return false;
                return c1.close > c1.open && c2.close < c2.open &&
                    Math.abs(c2.close - c2.open) < Math.abs(c1.close - c1.open) * 0.5 &&
                    c3.close < c3.open && c3.close < (c1.open + c1.close) / 2;
            },
            detectAll: (candles, idx) => {
                const patterns = [];
                const curr = candles[idx];
                const prev = candles[idx - 1];
                const prev2 = candles[idx - 2];
                if (!curr) return patterns;
                if (PatternDetector.isDoji(curr)) patterns.push({ name: "DOJI", type: "neutral", desc: "Indecision" });
                if (PatternDetector.isHammer(curr)) patterns.push({ name: "HAMMER", type: "bullish", desc: "Potential reversal up" });
                if (PatternDetector.isShootingStar(curr)) patterns.push({ name: "SHOOTING STAR", type: "bearish", desc: "Potential reversal down" });
                if (PatternDetector.isMarubozu(curr)) patterns.push({ name: "MARUBOZU", type: curr.close > curr.open ? "bullish" : "bearish", desc: "Strong momentum" });
                if (PatternDetector.isBullishEngulfing(prev, curr)) patterns.push({ name: "BULLISH ENGULFING", type: "bullish", desc: "Strong reversal up" });
                if (PatternDetector.isBearishEngulfing(prev, curr)) patterns.push({ name: "BEARISH ENGULFING", type: "bearish", desc: "Strong reversal down" });
                if (PatternDetector.isPiercing(prev, curr)) patterns.push({ name: "PIERCING", type: "bullish", desc: "Reversal up" });
                if (PatternDetector.isDarkCloudCover(prev, curr)) patterns.push({ name: "DARK CLOUD COVER", type: "bearish", desc: "Reversal down" });
                if (PatternDetector.isBullishHarami(prev, curr)) patterns.push({ name: "BULLISH HARAMI", type: "bullish", desc: "Potential reversal" });
                if (PatternDetector.isBearishHarami(prev, curr)) patterns.push({ name: "BEARISH HARAMI", type: "bearish", desc: "Potential reversal" });
                if (PatternDetector.isMorningStar(prev2, prev, curr)) patterns.push({ name: "MORNING STAR", type: "bullish", desc: "Strong reversal up" });
                if (PatternDetector.isEveningStar(prev2, prev, curr)) patterns.push({ name: "EVENING STAR", type: "bearish", desc: "Strong reversal down" });
                return patterns;
            }
        };

        // ============================================================
        // PREDICTION ENGINE (20 seconds ahead)
        // ============================================================
        const PredictionEngine = {
            predictionInterval: null,
            predictionLineSeries: null,
            predictionTimeout: null,
            markerSeries: null,

            calculateRisk: function (currentPrice, patternStrength) {
                const volatility = currentPrice * 0.01;
                const riskFactor = Math.min(2.5, patternStrength * 0.8);
                const riskAmount = (volatility * riskFactor).toFixed(2);
                return {
                    amount: `₹${parseFloat(riskAmount).toLocaleString('en-IN')}`,
                    percentage: `${(patternStrength * 1.5).toFixed(1)}%`,
                    stopLoss: `₹${(currentPrice - parseFloat(riskAmount)).toFixed(2)}`,
                    takeProfit: `₹${(currentPrice + parseFloat(riskAmount) * 1.8).toFixed(2)}`
                };
            },

            predictEmergingPattern: function (currentCandles, currentPrice) {
                if (!currentCandles || currentCandles.length < 5) return null;
                const curr = currentCandles[currentCandles.length - 1];
                const prev = currentCandles[currentCandles.length - 2];
                const prev2 = currentCandles[currentCandles.length - 3];
                const bodySize = Math.abs(curr.close - curr.open);
                const range = curr.high - curr.low;
                const isBullishSoFar = curr.close > curr.open;
                const lowerWick = Math.min(curr.open, curr.close) - curr.low;
                const upperWick = curr.high - Math.max(curr.open, curr.close);
                if (range > 0 && bodySize / range <= 0.15) {
                    return { pattern: "DOJI (Forming)", type: "neutral", probability: 82, description: "Indecision - Market equilibrium", action: "WAIT", riskAmount: this.calculateRisk(currentPrice, 0.5) };
                }
                if (lowerWick >= (bodySize * 1.8) && upperWick <= (bodySize * 0.3) && !isBullishSoFar) {
                    return { pattern: "HAMMER (Forming)", type: "bullish", probability: 78, description: "Buying pressure emerging after downtrend", action: "BUY at next candle open", riskAmount: this.calculateRisk(currentPrice, 1.2) };
                }
                if (upperWick >= (bodySize * 1.8) && lowerWick <= (bodySize * 0.3) && isBullishSoFar) {
                    return { pattern: "SHOOTING STAR (Forming)", type: "bearish", probability: 76, description: "Selling pressure emerging after uptrend", action: "SELL at next candle open", riskAmount: this.calculateRisk(currentPrice, 1.2) };
                }
                if (prev) {
                    const prevBearish = prev.close < prev.open;
                    const engulfingPotential = curr.open < prev.close && curr.close > prev.open;
                    if (prevBearish && isBullishSoFar && engulfingPotential) {
                        return { pattern: "BULLISH ENGULFING (Forming)", type: "bullish", probability: 85, description: "Strong reversal up - Buyers overwhelming sellers", action: "AGGRESSIVE BUY", riskAmount: this.calculateRisk(currentPrice, 2.0) };
                    }
                    const prevBullish = prev.close > prev.open;
                    const bearishEngulfingPotential = curr.open > prev.close && curr.close < prev.open;
                    if (prevBullish && !isBullishSoFar && bearishEngulfingPotential) {
                        return { pattern: "BEARISH ENGULFING (Forming)", type: "bearish", probability: 84, description: "Strong reversal down - Sellers overwhelming buyers", action: "AGGRESSIVE SELL", riskAmount: this.calculateRisk(currentPrice, 2.0) };
                    }
                }
                if (prev && prev2) {
                    const firstBearish = prev2.close < prev2.open;
                    const secondSmall = Math.abs(prev.close - prev.open) < Math.abs(prev2.close - prev2.open) * 0.5;
                    if (firstBearish && secondSmall && isBullishSoFar) {
                        return { pattern: "MORNING STAR (Forming)", type: "bullish", probability: 88, description: "Strong reversal up after downtrend", action: "STRONG BUY", riskAmount: this.calculateRisk(currentPrice, 2.2) };
                    }
                    const firstBullish = prev2.close > prev2.open;
                    if (firstBullish && secondSmall && !isBullishSoFar) {
                        return { pattern: "EVENING STAR (Forming)", type: "bearish", probability: 87, description: "Strong reversal down after uptrend", action: "STRONG SELL", riskAmount: this.calculateRisk(currentPrice, 2.2) };
                    }
                }
                return null;
            },

            displayPrediction: function (chart, candle, prediction, currentPrice) {
                if (!chart || !candle) return;
                if (this.predictionLineSeries) {
                    try { chart.removeSeries(this.predictionLineSeries); } catch (e) { }
                    try { if (this.markerSeries) chart.removeSeries(this.markerSeries); } catch (e) { }
                }
                if (this.predictionTimeout) clearTimeout(this.predictionTimeout);
                let color = "#ffaa44";
                if (prediction.type === "bullish") color = "#00ff88";
                if (prediction.type === "bearish") color = "#FF69B4";
                const shiftDown = (candle.high - candle.low) * 0.25;
                const predictionPrice = candle.low - shiftDown;
                this.predictionLineSeries = chart.addLineSeries({
                    color: color, lineWidth: 2, lineStyle: 2,
                    pointMarkersVisible: true, pointMarkerColor: color, pointMarkerSize: 10,
                    lastValueVisible: false, priceLineVisible: false,
                    title: `🔮 ${prediction.pattern} (${prediction.probability}%)`
                });
                this.predictionLineSeries.setData([{ time: candle.time, value: predictionPrice }]);
                this.markerSeries = chart.addLineSeries({
                    color: color, lineWidth: 0,
                    pointMarkersVisible: true, pointMarkerColor: color + "80", pointMarkerSize: 14,
                    lastValueVisible: false, priceLineVisible: false
                });
                this.markerSeries.setData([{ time: candle.time + 20, value: predictionPrice }]);
                this.predictionTimeout = setTimeout(() => {
                    if (this.predictionLineSeries) {
                        try { chart.removeSeries(this.predictionLineSeries); } catch (e) { }
                        try { if (this.markerSeries) chart.removeSeries(this.markerSeries); } catch (e) { }
                        this.predictionLineSeries = null;
                    }
                }, 15000);
                const panel = document.getElementById('prediction-panel');
                const titleSpan = document.getElementById('pred-title');
                const confidenceSpan = document.getElementById('pred-confidence');
                const patternSpan = document.getElementById('pred-pattern');
                const descSpan = document.getElementById('pred-desc');
                const actionSpan = document.getElementById('pred-action');
                const riskAmountSpan = document.getElementById('risk-amount');
                const riskPercentSpan = document.getElementById('risk-percent');
                const riskSlSpan = document.getElementById('risk-sl');
                const riskTpSpan = document.getElementById('risk-tp');
                if (panel) {
                    panel.style.display = "block";
                    panel.style.borderLeftColor = color;
                    if (titleSpan) titleSpan.style.color = color;
                    if (confidenceSpan) {
                        confidenceSpan.textContent = `${prediction.probability}%`;
                        confidenceSpan.style.color = prediction.probability >= 75 ? "#00ff88" : (prediction.probability >= 55 ? "#ffaa44" : "#FF69B4");
                    }
                    if (patternSpan) patternSpan.textContent = prediction.pattern;
                    if (descSpan) descSpan.textContent = prediction.description;
                    if (actionSpan) {
                        actionSpan.textContent = prediction.action;
                        actionSpan.style.color = color;
                    }
                    if (riskAmountSpan) riskAmountSpan.textContent = prediction.riskAmount.amount;
                    if (riskPercentSpan) riskPercentSpan.textContent = prediction.riskAmount.percentage;
                    if (riskSlSpan) riskSlSpan.textContent = prediction.riskAmount.stopLoss;
                    if (riskTpSpan) riskTpSpan.textContent = prediction.riskAmount.takeProfit;
                }
                console.log(`%c🔮 PREDICTION: ${prediction.pattern} | ${prediction.probability}% | Risk: ${prediction.riskAmount.amount}`, `color: ${color}; font-weight: bold`);
            },

            start: function (chart, getCandles, getCurrentPrice) {
                if (this.predictionInterval) clearInterval(this.predictionInterval);
                this.predictionInterval = setInterval(() => {
                    try {
                        const candles = getCandles();
                        const currentPrice = getCurrentPrice();
                        if (!candles || candles.length < 5 || !currentPrice) return;
                        const prediction = this.predictEmergingPattern(candles, currentPrice);
                        if (prediction && prediction.probability >= 55) {
                            const lastCandle = candles[candles.length - 1];
                            this.displayPrediction(chart, lastCandle, prediction, currentPrice);
                        }
                    } catch (e) { console.warn("Prediction error:", e); }
                }, 4000);
            },
            stop: function () { if (this.predictionInterval) { clearInterval(this.predictionInterval); this.predictionInterval = null; } }
        };

        // ============================================================

        // ============================================================
        let chart = null;
        let candleSeries = null;
        let volumeSeries = null;
        let currentCandles = [];
        let currentTimeframeSeconds = 900;
        let ws = null;
        let lastLTP = 24800;
        let authToken = null;
        let feedToken = null;
        let lastLabeledTime = null;

        const SYMBOLS = [
            { name: "NIFTY", token: "26000", exchange: 1 },
            { name: "BANKNIFTY", token: "26009", exchange: 1 },
            { name: "RELIANCE", token: "2885", exchange: 1 },
            { name: "TCS", token: "11536", exchange: 1 },
            { name: "HDFC", token: "1333", exchange: 1 },
            { name: "INFY", token: "4083", exchange: 1 },
            { name: "ICICI", token: "10666", exchange: 1 },
            { name: "SBI", token: "3045", exchange: 1 },
            { name: "HINDUNILVR", token: "1394", exchange: 1 },
            { name: "ITC", token: "4244", exchange: 1 }
        ];
        let currentSymbolIndex = 0;

        function generateHistoricalData(basePrice, count = 400) {
            const candles = [];
            let price = basePrice || 24800;
            const now = Math.floor(Date.now() / 1000);
            for (let i = count; i >= 0; i--) {
                const time = now - i * currentTimeframeSeconds;
                const volatility = price * 0.0015;
                const open = price + (Math.random() - 0.5) * volatility;
                const close = open + (Math.random() - 0.48) * volatility * 0.7;
                const high = Math.max(open, close) + Math.random() * volatility * 0.5;
                const low = Math.min(open, close) - Math.random() * volatility * 0.5;
                candles.push({ time, open: parseFloat(open.toFixed(2)), high: parseFloat(high.toFixed(2)), low: parseFloat(low.toFixed(2)), close: parseFloat(close.toFixed(2)) });
                price = close;
            }
            return candles;
        }

        function initChart() {
            const container = document.getElementById('chart');
            chart = LightweightCharts.createChart(container, {
                width: window.innerWidth, height: window.innerHeight,
                layout: { background: { type: 'solid', color: '#000000' }, textColor: '#999999' },
                grid: { vertLines: { color: 'rgba(255,255,255,0.04)' }, horzLines: { color: 'rgba(255,255,255,0.04)' } },
                rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)', scaleMargins: { top: 0.2, bottom: 0.15 } },
                timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true, secondsVisible: false }
            });
            candleSeries = chart.addCandlestickSeries({ upColor: '#00ff88', downColor: '#ff4444', borderUpColor: '#00ff88', borderDownColor: '#ff4444' });
            volumeSeries = chart.addHistogramSeries({ color: 'rgba(0,255,136,0.2)', priceFormat: { type: 'volume' }, priceScaleId: 'volume' });
            chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
        }

        function updateTopBarStats(candle) {
            if (!candle) return;
            const price = candle.close;
            const prevClose = currentCandles.length > 1 ? currentCandles[currentCandles.length - 2]?.close : price;
            const change = ((price - prevClose) / prevClose) * 100;
            document.getElementById('currentPrice').textContent = `₹${price.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            changeEl.className = `price-change ${change >= 0 ? 'price-up' : 'price-down'}`;
        }

        function detectAndLabelPatterns() {
            if (currentCandles.length < 3) return;
            const lastIdx = currentCandles.length - 1;
            const lastCandle = currentCandles[lastIdx];
            if (lastLabeledTime === lastCandle.time) return;
            const patterns = PatternDetector.detectAll(currentCandles, lastIdx);
            if (patterns.length > 0) {
                let mainPattern = patterns[0];
                let color = mainPattern.type === 'bullish' ? '#00ff88' : (mainPattern.type === 'bearish' ? '#ff4444' : '#ffaa44');
                const labelPrice = lastCandle.low - (lastCandle.high - lastCandle.low) * 0.15;
                const labelSeries = chart.addLineSeries({ color, lineWidth: 0, pointMarkersVisible: true, pointMarkerColor: color, pointMarkerSize: 8, lastValueVisible: false, priceLineVisible: false, title: mainPattern.name });
                labelSeries.setData([{ time: lastCandle.time, value: labelPrice }]);
                lastLabeledTime = lastCandle.time;
                console.log(`%c🔔 PATTERN: ${mainPattern.name}`, `color: ${color}; font-weight: bold`);
            }
        }

        function updateCurrentCandle(price, timestampSec) {
            if (!currentCandles.length) return;
            const lastCandle = currentCandles[currentCandles.length - 1];
            const timeDiff = timestampSec - lastCandle.time;
            if (timeDiff >= currentTimeframeSeconds) {
                const newTime = lastCandle.time + currentTimeframeSeconds;
                const newCandle = { time: newTime, open: lastCandle.close, high: price, low: price, close: price };
                newCandle.high = Math.max(newCandle.open, price);
                newCandle.low = Math.min(newCandle.open, price);
                currentCandles.push(newCandle);
                if (currentCandles.length > 500) currentCandles.shift();
                candleSeries.setData(currentCandles);
                updateTopBarStats(newCandle);
                detectAndLabelPatterns();
                return;
            }
            lastCandle.high = Math.max(lastCandle.high, price);
            lastCandle.low = Math.min(lastCandle.low, price);
            lastCandle.close = price;
            candleSeries.update(lastCandle);
            updateTopBarStats(lastCandle);
        }

        function processLiveTick(tick) {
            const currentSym = SYMBOLS[currentSymbolIndex];
            if (tick.token === currentSym.token || tick.symbol === currentSym.name) {
                const ltp = tick.ltp || tick.last_price || tick.LTP || tick.close || tick.price;
                if (ltp && ltp > 0) {
                    lastLTP = parseFloat(ltp);
                    const nowSec = Math.floor(Date.now() / 1000);
                    updateCurrentCandle(lastLTP, nowSec);
                    if (tick.volume) document.getElementById('statVolume').textContent = tick.volume.toLocaleString();
                    if (tick.open) document.getElementById('statOpen').textContent = tick.open.toFixed(2);
                    if (tick.high) document.getElementById('statHigh').textContent = tick.high.toFixed(2);
                    if (tick.low) document.getElementById('statLow').textContent = tick.low.toFixed(2);
                }
            }
        }

        async function loginToAngelOne() {
            document.getElementById('wsStatus').innerHTML = "🔐 LOGGING IN...";
            try {
                const totp = prompt("🔑 Enter 6-digit OTP (Angel One):", "");
                if (!totp) throw new Error("OTP required");
                const response = await fetch('https://apiconnect.angelone.in/rest/auth/angelbroking/user/v1/loginByPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ clientcode: CLIENT_CODE, password: PASSWORD, totp: totp, apikey: API_KEY })
                });
                const data = await response.json();
                if (data.status && data.data) {
                    authToken = data.data.jwtToken;
                    feedToken = data.data.feedToken;
                    document.getElementById('wsStatus').innerHTML = "🟢 CONNECTED";
                    connectWebSocket();
                    return true;
                } else {
                    document.getElementById('wsStatus').innerHTML = "❌ LOGIN FAILED";
                    return false;
                }
            } catch (err) {
                document.getElementById('wsStatus').innerHTML = "⚠️ ERROR";
                return false;
            }
        }

        function connectWebSocket() {
            const wsUrl = "wss://smartapisocket.angelone.in/smart-stream";
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                const loginMsg = JSON.stringify({ request: "login", jwtToken: authToken, feedToken: feedToken, apiKey: API_KEY, clientCode: CLIENT_CODE });
                ws.send(loginMsg);
                setTimeout(() => {
                    SYMBOLS.forEach(sym => { ws.send(JSON.stringify({ request: "subscribe", exchange: sym.exchange, token: sym.token, correlationID: `sub_${sym.name}` })); });
                }, 2000);
            };
            ws.onmessage = (event) => { try { const data = JSON.parse(event.data); processLiveTick(data); } catch (e) { } };
            ws.onclose = () => { setTimeout(() => { if (authToken) connectWebSocket(); }, 5000); };
        }

        function switchSymbol(index) {
            currentSymbolIndex = index;
            document.getElementById('symbolName').textContent = SYMBOLS[index].name;
            currentCandles = generateHistoricalData(lastLTP, 400);
            candleSeries.setData(currentCandles);
            chart.timeScale().fitContent();
            if (currentCandles.length) updateTopBarStats(currentCandles[currentCandles.length - 1]);
            lastLabeledTime = null;
        }

        function addSymbolSelector() {
            const selector = document.createElement('select');
            SYMBOLS.forEach((sym, idx) => { const opt = document.createElement('option'); opt.value = idx; opt.textContent = sym.name; selector.appendChild(opt); });
            selector.addEventListener('change', (e) => switchSymbol(parseInt(e.target.value)));
            document.querySelector('.symbol-info').appendChild(selector);
        }

        function bindTimeframeButtons() {
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const mapping = { '1m': 60, '5m': 300, '15m': 900, '1h': 3600, '4h': 14400, '1D': 86400 };
                    currentTimeframeSeconds = mapping[this.dataset.tf] || 900;
                    currentCandles = generateHistoricalData(lastLTP, 380);
                    candleSeries.setData(currentCandles);
                    chart.timeScale().fitContent();
                    if (currentCandles.length) updateTopBarStats(currentCandles[currentCandles.length - 1]);
                    lastLabeledTime = null;
                });
            });
        }

        function startFallbackSimulation() {
            setInterval(() => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    const drift = (Math.random() - 0.48) * 0.0008;
                    lastLTP = parseFloat((lastLTP * (1 + drift)).toFixed(2));
                    updateCurrentCandle(lastLTP, Math.floor(Date.now() / 1000));
                }
            }, 300);
        }

        window.addEventListener('resize', () => { if (chart) chart.applyOptions({ width: window.innerWidth, height: window.innerHeight }); });

        function addDataExportButton() {
            const exportBtn = document.createElement('button');
            exportBtn.innerHTML = '📥 EXPORT PAST DATA (CSV)';
            exportBtn.style.cssText = `position: fixed; top: 80px; right: 20px; z-index: 1000; background: #00ff88; color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 2px 10px rgba(0,255,136,0.3); transition: all 0.3s;`;
            exportBtn.onmouseover = () => exportBtn.style.transform = 'scale(1.05)';
            exportBtn.onmouseout = () => exportBtn.style.transform = 'scale(1)';
            exportBtn.onclick = () => showDataModal();
            document.body.appendChild(exportBtn);
        }

        function showDataModal() {
            const modal = document.createElement('div');
            modal.style.cssText = `position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; flex-direction: column; padding: 20px; overflow: auto;`;
            modal.innerHTML = `<div style="background: #1a1a1a; border-radius: 12px; padding: 20px; max-width: 1400px; margin: auto;"><div style="display: flex; justify-content: space-between; margin-bottom: 20px;"><h2 style="color: #00ff88;">📊 PAST DATA (${currentCandles.length} Candles)</h2><div><button id="copyDataBtn" style="background:#00ff88; color:black; padding:8px 16px; border:none; border-radius:6px; margin-right:10px; cursor:pointer;">📋 COPY CSV</button><button id="downloadDataBtn" style="background:#ffaa44; color:black; padding:8px 16px; border:none; border-radius:6px; margin-right:10px; cursor:pointer;">💾 DOWNLOAD CSV</button><button id="closeModalBtn" style="background:#ff4444; color:white; padding:8px 16px; border:none; border-radius:6px; cursor:pointer;">✖ CLOSE</button></div></div><div style="overflow-x:auto;"><table id="dataTable" style="width:100%; border-collapse:collapse; font-size:12px;"><thead><tr style="background:#00ff88; color:black;"><th style="padding:8px;">#</th><th>DATE & TIME</th><th>OPEN (₹)</th><th>HIGH (₹)</th><th>LOW (₹)</th><th>CLOSE (₹)</th><th>CHANGE %</th></tr></thead><tbody id="dataTableBody"></tbody></table></div><div style="margin-top:20px; color:#888;"><p>📌 Total Candles: ${currentCandles.length} | Timeframe: ${currentTimeframeSeconds / 60} minutes</p></div></div>`;
            document.body.appendChild(modal);
            const tbody = modal.querySelector('#dataTableBody');
            currentCandles.slice(-300).forEach((candle, idx) => {
                const date = new Date(candle.time * 1000).toLocaleString('en-IN');
                const change = idx > 0 ? ((candle.close - currentCandles[currentCandles.length - 301 + idx - 1].close) / currentCandles[currentCandles.length - 301 + idx - 1].close * 100).toFixed(2) : '0';
                const row = tbody.insertRow();
                row.innerHTML = `<td style="padding:6px;">${idx + 1}</td><td>${date}</td><td style="text-align:right;">${candle.open.toFixed(2)}</td><td style="text-align:right;color:#00ff88;">${candle.high.toFixed(2)}</td><td style="text-align:right;color:#ff4444;">${candle.low.toFixed(2)}</td><td style="text-align:right;font-weight:bold;">${candle.close.toFixed(2)}</td><td style="text-align:right;color:${change >= 0 ? '#00ff88' : '#ff4444'}">${change > 0 ? '+' : ''}${change}%</td>`;
            });
            function generateCSV() { let csv = "Index,DateTime,Open,High,Low,Close,Change%\n"; currentCandles.slice(-300).forEach((c, idx) => { const dt = new Date(c.time * 1000).toISOString(); const chg = idx > 0 ? ((c.close - currentCandles[currentCandles.length - 301 + idx - 1].close) / currentCandles[currentCandles.length - 301 + idx - 1].close * 100).toFixed(2) : '0'; csv += `${idx + 1},${dt},${c.open},${c.high},${c.low},${c.close},${chg}\n`; }); return csv; }
            modal.querySelector('#copyDataBtn').onclick = async () => { await navigator.clipboard.writeText(generateCSV()); alert('✅ CSV copied!'); };
            modal.querySelector('#downloadDataBtn').onclick = () => { const blob = new Blob([generateCSV()], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tradeassist_${Date.now()}.csv`; a.click(); URL.revokeObjectURL(a.href); alert('✅ Downloaded'); };
            modal.querySelector('#closeModalBtn').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }

        function init() {
            initChart();
            currentCandles = generateHistoricalData(24800, 400);
            candleSeries.setData(currentCandles);
            chart.timeScale().fitContent();
            updateTopBarStats(currentCandles[currentCandles.length - 1]);
            addSymbolSelector();
            bindTimeframeButtons();
            startFallbackSimulation();
            loginToAngelOne();
            setTimeout(() => {
                PredictionEngine.start(() => chart, () => currentCandles, () => lastLTP);
                console.log("✅ Prediction Engine Started - 20s ahead predictions active! | API Key: Fyt3hWTf | Secret integrated");
            }, 3000);
            setTimeout(() => addDataExportButton(), 2000);
        }
        init();
    </script>
