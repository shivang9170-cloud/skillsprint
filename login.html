<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SkillSprint Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: #0f172a;
            overflow: hidden;
        }

        /* 🌌 Animated Background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #06b6d4 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 20s linear infinite;
            opacity: 0.2;
        }

        @keyframes moveBg {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-200px, -200px);
            }
        }

        /* ✨ Floating circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.1);
            animation: float 10s infinite linear;
        }

        .circle:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            top: 20%;
        }

        .circle:nth-child(2) {
            width: 120px;
            height: 120px;
            left: 70%;
            top: 60%;
        }

        .circle:nth-child(3) {
            width: 60px;
            height: 60px;
            left: 40%;
            top: 80%;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-50px);
            }

            100% {
                transform: translateY(0);
            }
        }

        /* 💎 Glass Card */
        .card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -40%);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #06b6d4;
        }

        /* Inputs */
        .input-box {
            position: relative;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #555;
            color: white;
            outline: none;
        }

        .input-box label {
            position: absolute;
            left: 0;
            top: 10px;
            color: #aaa;
            transition: 0.3s;
        }

        .input-box input:focus+label,
        .input-box input:valid+label {
            top: -10px;
            font-size: 12px;
            color: #06b6d4;
        }

        /* Button */
        button {
            width: 100%;
            padding: 10px;
            background: #06b6d4;
            border: none;
            border-radius: 25px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px #06b6d4;
            transform: scale(1.05);
        }

        /* Links */
        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            color: #06b6d4;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-shadow: 0 0 10px #06b6d4;
        }
    </style>
</head>

<body>

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="card">
        <h2>🚀 SkillSprint</h2>

        <div class="input-box">
            <input type="text" id="user" required>
            <label>User ID</label>
        </div>

        <div class="input-box">
            <input type="password" id="pass" required>
            <label>Password</label>
        </div>

        <button onclick="login()">Login</button>

        <div class="links">
            <p><a href="register.html">New user? Register</a></p>
            <p><a href="forgot.pass.html">Forgot Password?</a></p>
        </div>
    </div>

    <script>
        // login now in auth.js
    </script>

</body>

</html>
